services:
  db:
    image: postgres:15
    container_name: prepnest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d myapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prepnest-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@db:5432/myapp
      PG_HOST: db
      PG_PORT: 5432
      PG_DATABASE: myapp
      PG_USER: admin
      PG_PASSWORD: secret
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DEBUG: "true"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    container_name: prepnest-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://127.0.0.1:8000/api/v1
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  pgdata:
  frontend_node_modules:
