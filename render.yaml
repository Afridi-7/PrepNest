services:
  - type: web
    name: prepnest-backend
    env: python
    rootDir: backend
    buildCommand: pip install --upgrade pip ; pip install -r requirements.txt
    # `--proxy-headers` + `--forwarded-allow-ips "*"` makes uvicorn read the
    # X-Forwarded-For header that Render's load balancer injects, so
    # `request.client.host` is the real end-user IP. Combined with
    # TRUST_PROXY_HEADERS=true below, the rate-limit buckets are correctly
    # scoped per real user instead of all users sharing the proxy's IP.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips "*"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: TRUST_PROXY_HEADERS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: uploads
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
