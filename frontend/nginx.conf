server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers — applied to every response. These are intentionally
    # conservative so they don't break Google OAuth, Vite-bundled assets, or
    # API calls proxied through the same origin.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://prepnest.onrender.com https://accounts.google.com https://oauth2.googleapis.com; frame-src 'self' blob: https://*.supabase.co https://prepnest.onrender.com https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    # Compress text-based responses on the fly. Modern Nginx ships with the
    # gzip module enabled by default; we explicitly opt-in here so the SPA's
    # JS/CSS bundles travel ~70% smaller. Static assets that are already
    # compressed (images, fonts, PDFs) are intentionally excluded.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/wasm
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    # Vite emits fingerprinted assets under /assets/ — they're safe to cache
    # aggressively because their hashed filenames change on every build.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Re-apply the universal security headers since `add_header` doesn't
        # inherit into nested location blocks.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # Other long-lived static files at the site root (favicons, manifest, etc.)
    # — short cache so updates still propagate quickly.
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|otf)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    location / {
        # The HTML shell must NOT be cached — otherwise users get stuck on
        # an old index.html that references hashed assets which no longer exist.
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
